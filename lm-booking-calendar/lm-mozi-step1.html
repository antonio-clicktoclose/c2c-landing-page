<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hormozi Call Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #161616;
      color: #ffffff;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background-color: #161616;
      border-bottom: 1px solid #1a1f3a;
      padding: 18px 40px;
      text-align: center;
    }
    header span {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0;
      text-transform: none;
    }

    /* HERO */
    .hero {
      background: #161616;
      padding: 70px 24px 40px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
      margin: 0 auto 20px;
      color: #ffffff;
    }

    .hero h1 span {
      color: #ffffff;
    }

    .hero p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #a0aec0;
      max-width: 620px;
      margin: 0 auto 48px;
      line-height: 1.7;
    }

    /* FORM BOX */
    .form-section {
      max-width: 560px;
      margin: 0 auto;
    }

    .ghl-form-wrapper iframe {
      width: 100%;
      height: 630px;
      border: none;
      border-radius: 3px;
    }

    /* TRUST STRIP */
    .trust-strip {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-top: 32px;
      padding: 0 24px;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #718096;
    }

    .trust-item svg {
      color: #3b5bdb;
      flex-shrink: 0;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #4a5568;
      border-top: 1px solid #1a1f3a;
    }

    @media (max-width: 600px) {
      .form-section {
        padding: 28px 20px;
      }
      header {
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <span>Clicktoclose.ai</span>
  </header>

  <!-- HERO -->
  <section class="hero">

    <h1>Hormozi <span>Call Analyzer</span></h1>

    <p>AI workflow that evaluates your sales calls based on Alex Hormozi's frameworks.</p>

    <!-- WORKFLOW IMAGE -->
    <div style="max-width:720px;margin:0 auto 40px;">
      <img src="workflow.png" alt="Workflow" style="width:100%;border-radius:12px;" />
    </div>

    <!-- FORM BOX -->
    <div class="form-section">
      <div class="ghl-form-wrapper">
        <iframe
          src="https://crm-api.clicktoclose.ai/widget/form/97hredh97IM5ix5XmUMR"
          style="width:100%;height:630px;border:none;border-radius:3px"
          id="inline-97hredh97IM5ix5XmUMR"
          data-layout="{'id':'INLINE'}"
          data-trigger-type="alwaysShow"
          data-trigger-value=""
          data-activation-type="alwaysActivated"
          data-activation-value=""
          data-deactivation-type="neverDeactivate"
          data-deactivation-value=""
          data-form-name="Form - Comment MOZI"
          data-height="630"
          data-layout-iframe-id="inline-97hredh97IM5ix5XmUMR"
          data-form-id="97hredh97IM5ix5XmUMR"
          title="Form - Comment MOZI"
        ></iframe>
        <script src="https://crm-api.clicktoclose.ai/js/form_embed.js"></script>
      </div>
    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 ClickToClose. All rights reserved.</p>
  </footer>

</body>
</html>
